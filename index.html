<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Dashboard</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="search-container">
        <input type="text" id="product-search" placeholder="Search products by title..." />
    </div>

    <div class="controls-container">
        <select id="category-filter" class="filter-select">
            <option value="all">All Categories</option>
            <option value="electronics">electronics</option>
            <option value="jewelery">jewelery</option>
            <option value="men's clothing">men's clothing</option>
            <option value="women's clothing">women's clothing</option>
        </select>
        <button id="sort-low-high" class="sort-btn">Sort Low → High</button>
        <button id="sort-high-low" class="sort-btn">Sort High → Low</button>
    </div>

    <div id="products" class="product-container"></div>

    <div id="detail-modal" class="modal hidden">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">×</button>
            <h2 id="modal-title"></h2>
            <img id="modal-image" src="" alt="Product image" />
            <p id="modal-description"></p>
            <p class="modal-price" id="modal-price"></p>
            <p class="modal-category" id="modal-category"></p>
        </div>
    </div>
    
    <script src="./script.js"></script>
</body>
</html>
